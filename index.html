<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspromonte Escursioni</title>

<style>

/* =========================
   VARIABILI COLORI
========================= */
:root {
  --green:#2d5a3d;
  --sand:#f5f1eb;
}

/* RESET BASE */
body {
  margin:0;
  font-family:Arial;
}

/* =========================
   NAVBAR
========================= */
nav {
  position:fixed;
  width:100%;
  background:var(--green);
  color:white;
  display:flex;
  justify-content:space-between;
  padding:15px;
}

/* link navbar */
nav a {
  margin:0 10px;
  cursor:pointer;
  color:white;
}

/* =========================
   HERO (HOME)
========================= */
.hero {
  height:80vh;
  background:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:2rem;
}

/* =========================
   SEZIONI GENERALI
========================= */
section {
  padding:80px 10%;
}

/* =========================
   GRIGLIA POST
========================= */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

/* CARD POST */
.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
}

/* background sezione escursioni */
.blog {
  background:var(--sand);
}

/* =========================
   MODALI (POPUP)
========================= */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

/* quando attiva */
.modal.active {
  display:flex;
}

/* contenuto modal */
.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:320px;
}

/* input form */
input,textarea,select {
  width:100%;
  margin-bottom:10px;
  padding:8px;
}

</style>
</head>

<body>

<!-- =========================
     NAVBAR
========================= -->
<nav>
  <div>AspromonteGuide</div>

  <!-- link navigazione -->
  <div>
    <a onclick="scrollToId('home')">Home</a>
    <a onclick="scrollToId('guide')">Guida</a>
    <a onclick="scrollToId('escursioni')">Escursioni</a>
    <a onclick="scrollToId('blog')">Blog</a>
    <a onclick="scrollToId('contatti')">Contatti</a>
  </div>

  <!-- apre pannello admin -->
  <button onclick="openAdmin()">Admin</button>
</nav>

<!-- =========================
     HOME
========================= -->
<div class="hero" id="home">
  Scopri l’Aspromonte
</div>

<!-- =========================
     GUIDA
========================= -->
<section id="guide">
  <h2>La Guida</h2>
  <p>Guida escursionistica esperta.</p>
</section>

<!-- =========================
     ESCURSIONI (post tipo escursione)
========================= -->
<section id="escursioni" class="blog">
  <h2>Escursioni</h2>

  <!-- qui carichiamo dinamicamente -->
  <div id="escursioniContainer" class="grid"></div>
</section>

<!-- =========================
     BLOG (post tipo blog)
========================= -->
<section id="blog">
  <h2>Blog</h2>

  <!-- qui carichiamo dinamicamente -->
  <div id="blogContainer" class="grid"></div>
</section>

<!-- =========================
     CONTATTI
========================= -->
<section id="contatti">
  <h2>Contatti</h2>
  <p>Email: info@aspromonte.it</p>
</section>

<!-- =========================
     MODAL ADMIN (CREA POST)
========================= -->
<div class="modal" id="adminModal">
  <div class="modal-content">

    <h3>Nuovo Post</h3>

    <!-- selezione tipo post -->
    <select id="type">
      <option value="escursione">Escursione</option>
      <option value="blog">Blog</option>
    </select>

    <!-- input -->
    <input id="title" placeholder="Titolo">
    <textarea id="content" placeholder="Testo"></textarea>
    <input id="image" placeholder="URL immagine">

    <!-- crea post -->
    <button onclick="addPost()">Pubblica</button>

  </div>
</div>

<!-- =========================
     MODAL DETTAGLIO POST
========================= -->
<div class="modal" id="postModal">
  <div class="modal-content">

    <h2 id="postTitle"></h2>
    <img id="postImage">
    <p id="postContent"></p>

    <button onclick="closePost()">Chiudi</button>

  </div>
</div>

<!-- =========================
     LIBRERIA SUPABASE
========================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* =========================
   CONFIGURAZIONE SUPABASE
========================= */
const supabaseClient = supabase.createClient(
  "https://jhldmqdfdmuttyjsfkrj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGRtcWRmZG11dHR5anNma3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjkwNDEsImV4cCI6MjA5MTc0NTA0MX0.ElIti6eL75OQaJzshXusQemATbT8osysWREKGrv-Rs0"
);

/* =========================
   SCROLL NAVBAR
========================= */
function scrollToId(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* =========================
   APRE MODAL ADMIN
========================= */
function openAdmin(){
  document.getElementById("adminModal").classList.add("active");
}

/* =========================
   CHIUDE DETTAGLIO POST
========================= */
function closePost(){
  document.getElementById("postModal").classList.remove("active");
}

/* =========================
   CREA NUOVO POST
========================= */
window.addPost = async function(){

  // prendiamo valori input
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const image = document.getElementById("image").value;
  const type = document.getElementById("type").value;

  // invio a Supabase
  await supabaseClient.from("posts").insert([
    { title, content, image_url: image, type }
  ]);

  // chiude modal
  document.getElementById("adminModal").classList.remove("active");

  // ricarica post
  loadPosts();
};

/* =========================
   CARICA POST DAL DATABASE
========================= */
async function loadPosts(){

  const { data } = await supabaseClient
    .from("posts")
    .select("*")
    .order("id",{ascending:false});

  // container sezioni
  const escContainer = document.getElementById("escursioniContainer");
  const blogContainer = document.getElementById("blogContainer");

  escContainer.innerHTML = "";
  blogContainer.innerHTML = "";

  data.forEach(post => {

    const el = document.createElement("div");
    el.className = "card";

    // costruiamo HTML
    let html = "";

    if(post.image_url){
      html += "<img src='"+post.image_url+"'>";
    }

    html += "<h3>"+post.title+"</h3>";
    html += "<p>"+post.content.substring(0,80)+"...</p>";

    el.innerHTML = html;

    // click apre dettaglio
    el.onclick = () => openPost(post);

    // smistamento tra blog ed escursioni
    if(post.type === "blog"){
      blogContainer.appendChild(el);
    } else {
      escContainer.appendChild(el);
    }

  });
}

/* =========================
   APRE DETTAGLIO POST
========================= */
function openPost(post){

  document.getElementById("postTitle").innerText = post.title;
  document.getElementById("postContent").innerText = post.content;

  const img = document.getElementById("postImage");

  if(post.image_url){
    img.src = post.image_url;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }

  document.getElementById("postModal").classList.add("active");
}

/* =========================
   INIT
========================= */
loadPosts();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspromonte Escursioni</title>

  <style>
    :root {
      --forest: #2d5a3d;
      --forest-dark: #1e3d29;
      --sand: #f5f1eb;
      --white: #fff;
      --text: #333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    /* NAVBAR */
    nav {
      position: fixed;
      width: 100%;
      top: 0;
      background: var(--forest);
      color: white;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
    }

    /* SECTIONS */
    section {
      padding: 60px 10%;
    }

    h2 {
      margin-bottom: 20px;
      color: var(--forest);
    }

    /* CARDS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* BLOG */
    .blog {
      background: var(--sand);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      padding: 10px;
      background: var(--forest);
      color: white;
      border: none;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>AspromonteGuide</div>
  <div>
    <a href="#home">Home</a>
    <a href="#about">Guida</a>
    <a href="#blog">Blog</a>
  </div>
  <button onclick="openModal()">Admin</button>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div>
    <h1>Scopri l'Aspromonte</h1>
    <p>Escursioni guidate nella natura</p>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>La Guida</h2>
  <p>Guida esperta con anni di esperienza nell'Aspromonte.</p>
</section>

<!-- BLOG -->
<section class="blog" id="blog">
  <h2>Blog Escursioni</h2>
  <div id="posts" class="grid"></div>
</section>

<!-- ADMIN MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Nuovo Post</h3>
    <input id="title" placeholder="Titolo">
    <textarea id="content" placeholder="Testo"></textarea>
    <button onclick="addPost()">Pubblica</button>
  </div>
</div>

<script>
  let posts = [];

  function openModal() {
    document.getElementById('modal').classList.add('active');
  }

  function addPost() {
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;

    posts.unshift({ title, content });
    renderPosts();
  }

  function renderPosts() {
    const container = document.getElementById('posts');
    container.innerHTML = '';

    posts.forEach(p => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<h3>${p.title}</h3><p>${p.content}</p>`;
      container.appendChild(el);
    });
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspromonte Escursioni</title>

  <style>
    :root {
      --forest: #2d5a3d;
      --forest-dark: #1e3d29;
      --sand: #f5f1eb;
      --white: #fff;
      --text: #333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    nav {
      position: fixed;
      width: 100%;
      top: 0;
      background: var(--forest);
      color: white;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
    }

    section {
      padding: 60px 10%;
    }

    h2 {
      margin-bottom: 20px;
      color: var(--forest);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .blog {
      background: var(--sand);
    }

    .modal {
  display: none !important;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.modal.active {
  display: flex !important;
}

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      padding: 10px;
      background: var(--forest);
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<nav>
  <div>AspromonteGuide</div>
  <div>
    <a href="#home">Home</a>
    <a href="#about">Guida</a>
    <a href="#blog">Blog</a>
  </div>
  <button onclick="openModal()">Admin</button>
</nav>

<section class="hero" id="home">
  <div>
    <h1>Scopri l'Aspromonte</h1>
    <p>Escursioni guidate nella natura</p>
  </div>
</section>

<section id="about">
  <h2>La Guida</h2>
  <p>Guida esperta con anni di esperienza nell'Aspromonte.</p>
</section>

<section class="blog" id="blog">
  <h2>Blog Escursioni</h2>
  <div id="posts" class="grid"></div>
</section>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Nuovo Post</h3>
    <input id="title" placeholder="Titolo">
    <textarea id="content" placeholder="Testo"></textarea>
    <input id="image" placeholder="URL immagine (opzionale)">
    <button onclick="addPost()">Pubblica</button>
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  const supabaseClient = supabase.createClient(
    https://jhldmqdfdmuttyjsfkrj.supabase.co,
    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGRtcWRmZG11dHR5anNma3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjkwNDEsImV4cCI6MjA5MTc0NTA0MX0.ElIti6eL75OQaJzshXusQemATbT8osysWREKGrv-Rs0
  );

  function openModal() {
  const modal = document.getElementById('modal');
  console.log(modal);

  if (modal) {
    modal.classList.add('active');
  } else {
    alert("modal non trovato");
  }
}
  async function loadPosts() {
    const { data, error } = await supabaseClient
      .from("posts")
      .select("*")
      .order("created_at", { ascending: false });

    const container = document.getElementById('posts');
    container.innerHTML = "";

    data.forEach(post => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        ${post.image_url ? `<img src="${post.image_url}" style="width:100%; border-radius:10px;">` : ""}
        <h3>${post.title}</h3>
        <p>${post.content}</p>
      `;
      container.appendChild(el);
    });
  }

  async function addPost() {
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const image = document.getElementById('image').value;

    await supabaseClient.from("posts").insert([
      { title: title, content: content, image_url: image }
    ]);




    function openModal() {
  const modal = document.getElementById('modal');
  console.log(modal);
  modal.classList.add('active');
}
    alert("Post pubblicato!");

    document.getElementById('modal').classList.remove('active');

    loadPosts();
  }

  loadPosts();
</script>

<script>
function openModal() {
  alert("JS funziona");
}
</script>


  
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspromonte Escursioni</title>

  <style>
    :root {
      --forest: #2d5a3d;
      --sand: #f5f1eb;
      --text: #333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: var(--forest);
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
    }

    nav button {
      background: white;
      color: var(--forest);
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }

    .hero {
      height: 70vh;
      background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2rem;
      text-align: center;
    }

    section {
      padding: 60px 10%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .blog {
      background: var(--sand);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      padding: 10px;
      background: var(--forest);
      color: white;
      border: none;
      cursor: pointer;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<nav>
  <div>AspromonteGuide</div>
  <button onclick="openAdmin()">Admin</button>
</nav>

<div class="hero">
  Scopri l'Aspromonte
</div>

<section class="blog">
  <h2>Blog Escursioni</h2>
  <div id="posts" class="grid"></div>
</section>

<!-- ADMIN MODAL -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <h3>Nuovo Post</h3>
    <input id="title" placeholder="Titolo">
    <textarea id="content" placeholder="Contenuto"></textarea>
    <input id="image" placeholder="URL immagine (opzionale)">
    <button onclick="addPost()">Pubblica</button>
  </div>
</div>

<!-- POST MODAL -->
<div class="modal" id="postModal">
  <div class="modal-content">
    <h2 id="postTitle"></h2>
    <img id="postImage">
    <p id="postContent"></p>
    <button onclick="closePost()">Chiudi</button>
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://jhldmqdfdmuttyjsfkrj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGRtcWRmZG11dHR5anNma3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjkwNDEsImV4cCI6MjA5MTc0NTA0MX0.ElIti6eL75OQaJzshXusQemATbT8osysWREKGrv-Rs0";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* OPEN ADMIN */
function openAdmin() {
  document.getElementById("adminModal").classList.add("active");
}

/* CLOSE POST */
function closePost() {
  document.getElementById("postModal").classList.remove("active");
}

/* ADD POST */
window.addPost = async function () {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const image = document.getElementById("image").value;

  const { data, error } = await supabaseClient
    .from("posts")
    .insert([{
      title,
      content,
      image_url: image
    }]);

  console.log(data, error);

  document.getElementById("adminModal").classList.remove("active");

  loadPosts();
};

/* LOAD POSTS */
async function loadPosts() {
  const container = document.getElementById("posts");

  const { data, error } = await supabaseClient
    .from("posts")
    .select("*")
    .order("id", { ascending: false });

  container.innerHTML = "";

  data.forEach(post => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      ${post.image_url ? `<img src="${post.image_url}">` : ""}
      <h3>${post.title}</h3>
      <p>${post.content.substring(0, 80)}...</p>
    `;

    el.onclick = () => openPost(post);

    container.appendChild(el);
  });
}

/* OPEN SINGLE POST */
function openPost(post) {
  document.getElementById("postTitle").innerText = post.title;
  document.getElementById("postContent").innerText = post.content;

  const img = document.getElementById("postImage");

  if (post.image_url) {
    img.src = post.image_url;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }

  document.getElementById("postModal").classList.add("active");
}

/* INIT */
loadPosts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspromonte Escursioni</title>

<style>

/* =========================
   STILE GENERALE
========================= */
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f9f9f9;
  color:#333;
}

/* =========================
   NAVBAR
========================= */
nav {
  position:fixed;
  top:0;
  width:100%;
  background:#2d5a3d;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px; /* più spazio laterale */
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
  z-index:100;
}

/* link */
nav a {
  margin:0 12px;
  cursor:pointer;
  color:white;
  text-decoration:none;
  transition:0.2s;
}

nav a:hover {
  opacity:0.7;
}

/* pulsante admin migliorato */
nav button {
  margin-right:20px; /* 👈 spostato più a sinistra */
  padding:8px 14px;
  border:none;
  background:white;
  color:#2d5a3d;
  border-radius:6px;
  cursor:pointer;
}

/* =========================
   HERO
========================= */
.hero {
  height:80vh;
  background:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:2.5rem;
  text-align:center;
}

/* =========================
   SEZIONI
========================= */
section {
  padding:100px 10%;
}

/* =========================
   CARD
========================= */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  transition:0.3s;
  cursor:pointer;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  border-radius:10px;
}

/* =========================
   MODALI
========================= */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal.active {
  display:flex;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:12px;
  width:320px;
  position:relative;
}

/* bottone chiudi */
.close-btn {
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
  font-weight:bold;
}

/* input */
input,textarea,select {
  width:100%;
  margin-bottom:10px;
  padding:8px;
}

button {
  padding:10px;
  background:#2d5a3d;
  color:white;
  border:none;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div>AspromonteGuide</div>

  <div>
    <a onclick="scrollToId('home')">Home</a>
    <a onclick="scrollToId('guide')">Guida</a>
    <a onclick="scrollToId('escursioni')">Escursioni</a>
    <a onclick="scrollToId('blog')">Blog</a>
    <a onclick="scrollToId('contatti')">Contatti</a>
  </div>

  <button onclick="openAdmin()">Admin</button>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  Scopri l’Aspromonte
</div>

<!-- GUIDA -->
<section id="guide">
  <h2>La Guida</h2>
  <p>Guida escursionistica esperta nell’Aspromonte.</p>
</section>

<!-- ESCURSIONI -->
<section id="escursioni">
  <h2>Escursioni</h2>
  <div id="escursioniContainer" class="grid"></div>
</section>

<!-- BLOG -->
<section id="blog">
  <h2>Blog</h2>
  <div id="blogContainer" class="grid"></div>
</section>

<!-- CONTATTI -->
<section id="contatti">
  <h2>Contatti</h2>
  <p>Email: info@aspromonte.it</p>
</section>

<!-- MODAL ADMIN -->
<div class="modal" id="adminModal" onclick="outsideClick(event,'adminModal')">
  <div class="modal-content">

    <!-- chiudi -->
    <div class="close-btn" onclick="closeAdmin()">✕</div>

    <h3>Nuovo Post</h3>

    <select id="type">
      <option value="escursione">Escursione</option>
      <option value="blog">Blog</option>
    </select>

    <input id="title" placeholder="Titolo">
    <textarea id="content" placeholder="Testo"></textarea>
    <input id="image" placeholder="URL immagine">

    <button onclick="addPost()">Pubblica</button>
  </div>
</div>

<!-- MODAL POST -->
<div class="modal" id="postModal" onclick="outsideClick(event,'postModal')">
  <div class="modal-content">

    <div class="close-btn" onclick="closePost()">✕</div>

    <h2 id="postTitle"></h2>
    <img id="postImage">
    <p id="postContent"></p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* SUPABASE */
const supabaseClient = supabase.createClient(
  "https://jhldmqdfdmuttyjsfkrj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGRtcWRmZG11dHR5anNma3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjkwNDEsImV4cCI6MjA5MTc0NTA0MX0.ElIti6eL75OQaJzshXusQemATbT8osysWREKGrv-Rs0"
);

/* SCROLL */
function scrollToId(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* OPEN/CLOSE ADMIN */
function openAdmin(){
  document.getElementById("adminModal").classList.add("active");
}
function closeAdmin(){
  document.getElementById("adminModal").classList.remove("active");
}

/* CLOSE POST */
function closePost(){
  document.getElementById("postModal").classList.remove("active");
}

/* CLICK FUORI = CHIUDE */
function outsideClick(e,id){
  if(e.target.id === id){
    document.getElementById(id).classList.remove("active");
  }
}

/* ESC = CHIUDE */
document.addEventListener("keydown", e=>{
  if(e.key === "Escape"){
    closeAdmin();
    closePost();
  }
});

/* ADD POST */
window.addPost = async function(){

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const image = document.getElementById("image").value;
  const type = document.getElementById("type").value;

  await supabaseClient.from("posts").insert([
    { title, content, image_url:image, type }
  ]);

  closeAdmin();
  loadPosts();
};

/* LOAD POSTS */
async function loadPosts(){

  const { data } = await supabaseClient
    .from("posts")
    .select("*")
    .order("id",{ascending:false});

  const esc = document.getElementById("escursioniContainer");
  const blog = document.getElementById("blogContainer");

  esc.innerHTML="";
  blog.innerHTML="";

  data.forEach(post=>{

    const el = document.createElement("div");
    el.className="card";

    let html="";

    if(post.image_url){
      html+="<img src='"+post.image_url+"'>";
    }

    html+="<h3>"+post.title+"</h3>";
    html+="<p>"+post.content.substring(0,80)+"...</p>";

    el.innerHTML=html;

    el.onclick=()=>openPost(post);

    if(post.type==="blog"){
      blog.appendChild(el);
    } else {
      esc.appendChild(el);
    }

  });
}

/* OPEN POST */
function openPost(post){

  document.getElementById("postTitle").innerText=post.title;
  document.getElementById("postContent").innerText=post.content;

  const img=document.getElementById("postImage");

  if(post.image_url){
    img.src=post.image_url;
    img.style.display="block";
  } else {
    img.style.display="none";
  }

  document.getElementById("postModal").classList.add("active");
}

/* INIT */
loadPosts();

</script>

</body>
</html>
